<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
</head>
<body>
    <script>
        const params = new URLSearchParams(location.search);
        const typeParam = params.get('type');

        const getLink = (type) => {
          switch (type) {
            case 'youtube':
                return 'https://www.youtube.com/@leafduvet64';
            case 'twitch':
                return 'https://www.twitch.tv/leafduvet64';
            case 'twitter':
                return 'https://x.com/leafduvet6401';
            case 'bluesky':
                return 'https://bsky.app/profile/leafduvet64.bsky.social';
            case 'instagram':
                return 'https://www.instagram.com/leafduvet64';
            case 'karotter':
                return 'https://karotter.com/profile/leafduvet64';
            case 'github':
                return 'https://github.com/leafduvet64';
            default:
                return '';
          }
        }

        const linkUrl = getLink(typeParam);
        console.log(linkUrl);
        location.replace(linkUrl);
        
    </script>
</body>
</html>
