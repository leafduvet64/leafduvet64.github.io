<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リンク一覧</title>
    <style>
        #list {
            margin-bottom: 4096px;
        }
        #aa {
            font-family: "MS PGothic", "ＭＳ Ｐゴシック", sans-serif;
        }

        .link {
            display: inline-block;
            padding: 0.5em 1em;
            border-radius: 10em;
            text-decoration: none;
            line-height: 1;
        }
        #youtube {
            background-color: #ff0033;
            color: #fff;
        }
        #twitch {
            background-color: #a970ff;
            color: #fff;
        }
        #twitter {
            /* https://www.bing.com/images/search?view=detailV2&ccid=UgTn8Ow3&id=AE942380C71C35F7AD332E1B37CA98C5FD9C7B2C&thid=OIP.UgTn8Ow3b4qYa_m5JoYrjAHaEK&mediaurl=https%3A%2F%2Flogocreator.io%2Fwp-content%2Fuploads%2F2023%2F11%2F64c2bb00cc53d81d58842318_og-twitter-x-492x277.png&exph=277&expw=492&q=twitter&FORM=IRPRST&ck=505DCA838BEC51E93385315F8B08B015&selectedIndex=2&itb=0&cw=1721&ch=864&ajaxhist=0&ajaxserp=0 */
            background-color: #1d9bf0;
            color: #fff;
        }
        #bluesky {
            background-color: #0f73ff;
            color: #fff;
        }
        #instagram {
            /* https://migi.me/css/instagram-gradation-button/ */
            background-image: linear-gradient(to right,
            rgba(247, 207, 0, 0.7),
            rgba(246, 37, 2, 0.7) 45%,
            rgba(182, 47, 82, 0.7) 75%,
            rgba(113, 58, 166, 0.7)
            );
            color: #fff;
        }
        #karotter {
            background-color: #1f88f7;
            color: #fff;
        }
        #github {
            background-color: #010409;
            color: #fff;
        }
    </style>
</head>
<body>
    <h1>リンクの一覧</h1>
    <p>
        多分工事中
    </p>
    <p id="list"></p>
    <p id="aa">
        
    　　　　∧__∧   <br>
    　　　（　´∀｀）<br>
    　　　(　O┬O    <br>
    ≡◎-ヽJ┴◎      <br>
    <a href="https://aa.kaomoji-copy.com/omaemona/">↑のソース</a>
    </p>

    <script type="module">
        const test = (string = '', index = 0) => string.substring(index, index+1);
        const title = (string = '') => {
          var result = '';
          for (var i = 0; i < string.length; i++) {
            var temp0 = test(string, i);
            var temp1 = test(string, i-1);
            result += (i === 0 || temp1 === ' ') ? temp0.toUpperCase() : temp0;
          }
          return result;
        }

        console.log(`Test: ${title('apple banana kiwi a b C 0 1 2')}`);

        const domParser = new DOMParser();
        //リンクの一覧を取得
        const fetchData = await fetch(`https://leafduvet64.github.io/links/links.json`);
        const jsonData = JSON.parse(await fetchData.text());
        //キーと値
        const keys = Object.keys(jsonData);
        const values = Object.values(jsonData);
        //書き込み
        for (var i = 0; i < keys.length; i++) {
          var content = domParser.parseFromString(`<a class="link" id="${keys[i]}" href="${values[i]}">${title(keys[i])}</a>`, 'text/html').body;
          document.getElementById('list').append(content);
        }
    </script>
</body>
</html>
